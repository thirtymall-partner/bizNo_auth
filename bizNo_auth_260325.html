<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>판매자 가이드 확인</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #111827;
      --sub: #6b7280;
      --line: #e5e7eb;
      --primary: #111827;
      --primary-hover: #1f2937;
      --error: #dc2626;
      --success: #059669;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 32px 24px;
      box-shadow: 0 10px 30px rgba(17, 24, 39, 0.06);
    }

    .badge {
      display: inline-block;
      font-size: 12px;
      line-height: 1;
      padding: 8px 10px;
      border-radius: 999px;
      background: #f3f4f6;
      color: #374151;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      line-height: 1.3;
    }

    .desc {
      margin: 0 0 24px;
      color: var(--sub);
      font-size: 15px;
      line-height: 1.6;
    }

    .field-label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 700;
    }

    .input-wrap {
      position: relative;
    }

    input[type="text"] {
      width: 100%;
      height: 52px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
      background: #fff;
    }

    input[type="text"]:focus {
      border-color: #9ca3af;
      box-shadow: 0 0 0 4px rgba(17, 24, 39, 0.06);
    }

    .btn {
      width: 100%;
      height: 52px;
      margin-top: 16px;
      border: 0;
      border-radius: 12px;
      background: var(--primary);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.02s ease;
    }

    .btn:hover {
      background: var(--primary-hover);
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn:disabled {
      opacity: 0.7;
      cursor: default;
    }

    .message {
      margin-top: 14px;
      min-height: 22px;
      font-size: 14px;
      line-height: 1.5;
    }

    .message.error {
      color: var(--error);
    }

    .message.success {
      color: var(--success);
    }

    .foot {
      margin-top: 22px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
      color: var(--sub);
      font-size: 12px;
      line-height: 1.6;
    }

    .loading-dot::after {
      content: "";
      display: inline-block;
      width: 1em;
      text-align: left;
      animation: dots 1s steps(4, end) infinite;
      overflow: hidden;
      vertical-align: bottom;
    }

    @keyframes dots {
      0% { content: ""; }
      25% { content: "."; }
      50% { content: ".."; }
      75% { content: "..."; }
      100% { content: ""; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="badge">떠리몰 판매자 라운지</div>
      <h1>판매자 인증</h1>
      <p class="desc">
        사업자번호 인증 후 열람이 가능합니다.
      </p>

      <label class="field-label" for="bizNo">사업자번호를 입력해 주세요. (숫자만 입력)</label>
      <div class="input-wrap">
        <input
          type="text"
          id="bizNo"
          inputmode="numeric"
          maxlength="12"
          placeholder="예: 1234567890"
          autocomplete="off"
        />
      </div>

      <button type="button" class="btn" id="submitBtn">사업자번호 인증</button>

      <div id="message" class="message"></div>

      <div class="foot">
        등록된 판매자가 아닐 경우 열람이 제한됩니다.
      </div>
    </div>
  </div>

  <script>
    const GITBOOK_BASE_URL = "https://thirtymall.gitbook.io/main/";
    const AUTH_STORAGE_KEY = "thirtymall_partner_auth";
    const AUTH_EXPIRE_HOURS = 24;

    const blockedNumbers = new Set([
      "0000000000",
      "1234567890",
      "0123456789",
      "1111111111",
      "2222222222",
      "3333333333",
      "4444444444",
      "5555555555",
      "6666666666",
      "7777777777",
      "8888888888",
      "9999999999"
    ]);

    const bizInput = document.getElementById("bizNo");
    const submitBtn = document.getElementById("submitBtn");
    const messageEl = document.getElementById("message");

    function getGuidePath() {
      const params = new URLSearchParams(window.location.search);
      const rawPath = (params.get("path") || "").trim();

      if (!rawPath) return null;
      if (rawPath.includes("http://") || rawPath.includes("https://")) return null;
      if (rawPath.includes("..")) return null;

      const cleaned = rawPath.replace(/^\/+/, "");

      if (!/^[a-zA-Z0-9/_-]+$/.test(cleaned)) return null;

      return cleaned;
    }

    function getAllowedTargetUrl() {
      const params = new URLSearchParams(window.location.search);
      const rawTarget = (params.get("target") || "").trim();

      if (!rawTarget) return null;

      try {
        const url = new URL(rawTarget);

        const isAllowedGoogleDriveFile =
          url.protocol === "https:" &&
          url.hostname === "drive.google.com" &&
          /^\/file\/d\/[^/]+\/view$/.test(url.pathname);

        if (isAllowedGoogleDriveFile) {
          return url.toString();
        }

        return null;
      } catch (e) {
        return null;
      }
    }

    function getRedirectUrl() {
      const targetUrl = getAllowedTargetUrl();
      if (targetUrl) return targetUrl;

      const path = getGuidePath();
      if (path) return GITBOOK_BASE_URL + path;

      return null;
    }

    function normalizeBizNo(value) {
      return value.replace(/[^0-9]/g, "");
    }

    function formatBizNo(value) {
      const onlyNumber = normalizeBizNo(value).slice(0, 10);

      if (onlyNumber.length < 4) return onlyNumber;
      if (onlyNumber.length < 6) {
        return onlyNumber.slice(0, 3) + "-" + onlyNumber.slice(3);
      }

      return (
        onlyNumber.slice(0, 3) +
        "-" +
        onlyNumber.slice(3, 5) +
        "-" +
        onlyNumber.slice(5)
      );
    }

    function isBlockedPattern(number) {
      if (blockedNumbers.has(number)) return true;
      if (/^(\d)\1{9}$/.test(number)) return true;
      return false;
    }

    function isValidBizNo(number) {
      if (!/^[0-9]{10}$/.test(number)) return false;

      const weights = [1, 3, 7, 1, 3, 7, 1, 3, 5];
      let sum = 0;

      for (let i = 0; i < 9; i++) {
        sum += Number(number[i]) * weights[i];
      }

      sum += Math.floor((Number(number[8]) * 5) / 10);
      const checkDigit = (10 - (sum % 10)) % 10;

      return checkDigit === Number(number[9]);
    }

    function showMessage(text, type) {
      messageEl.textContent = text;
      messageEl.className = "message " + (type || "");
    }

    function setLoading(isLoading, loadingText) {
      submitBtn.disabled = isLoading;
      submitBtn.textContent = isLoading ? (loadingText || "확인 중...") : "사업자번호 인증";

      if (isLoading) {
        submitBtn.classList.add("loading-dot");
      } else {
        submitBtn.classList.remove("loading-dot");
      }
    }

    function formatDateTime(date) {
      const yyyy = date.getFullYear();
      const mm = String(date.getMonth() + 1).padStart(2, "0");
      const dd = String(date.getDate()).padStart(2, "0");
      const hh = String(date.getHours()).padStart(2, "0");
      const mi = String(date.getMinutes()).padStart(2, "0");

      return `${yyyy}-${mm}-${dd} ${hh}:${mi}`;
    }

    function saveAuthState() {
      const now = Date.now();
      const expiresAt = now + AUTH_EXPIRE_HOURS * 60 * 60 * 1000;

      localStorage.setItem(
        AUTH_STORAGE_KEY,
        JSON.stringify({
          verified: true,
          verifiedAt: now,
          expiresAt: expiresAt
        })
      );
    }

    function getAuthState() {
      try {
        const raw = localStorage.getItem(AUTH_STORAGE_KEY);
        if (!raw) return null;

        const data = JSON.parse(raw);
        if (!data || !data.verified || !data.expiresAt || !data.verifiedAt) {
          localStorage.removeItem(AUTH_STORAGE_KEY);
          return null;
        }

        if (Date.now() > data.expiresAt) {
          localStorage.removeItem(AUTH_STORAGE_KEY);
          return null;
        }

        return data;
      } catch (e) {
        localStorage.removeItem(AUTH_STORAGE_KEY);
        return null;
      }
    }

    function autoRedirectIfAuthorized() {
      const redirectUrl = getRedirectUrl();
      const auth = getAuthState();

      if (!redirectUrl || !auth) return;

      const verifiedText = formatDateTime(new Date(auth.verifiedAt));
      showMessage(`${verifiedText} 인증 확인 ... 가이드로 이동합니다.`, "success");
      setLoading(true, "확인 중...");

      setTimeout(() => {
        window.location.href = redirectUrl;
      }, 700);
    }

    function moveToGuide() {
      const raw = bizInput.value;
      const bizNo = normalizeBizNo(raw);
      const redirectUrl = getRedirectUrl();

      showMessage("", "");

      if (!bizNo) {
        showMessage("사업자번호를 입력해 주세요.", "error");
        bizInput.focus();
        return;
      }

      if (bizNo.length !== 10) {
        showMessage("사업자번호 10자리를 입력해 주세요.", "error");
        bizInput.focus();
        return;
      }

      if (isBlockedPattern(bizNo)) {
        showMessage("유효한 사업자번호가 아닙니다.", "error");
        bizInput.focus();
        return;
      }

      if (!isValidBizNo(bizNo)) {
        showMessage("유효한 사업자번호가 아닙니다.", "error");
        bizInput.focus();
        return;
      }

      if (!redirectUrl) {
        showMessage("오류 발생. 관리자에게 문의해주세요. 30mall.assist@gmail.com", "error");
        return;
      }

      saveAuthState();

      const verifiedText = formatDateTime(new Date());
      setLoading(true, "확인 중...");
      showMessage(`${verifiedText} 인증 확인 ... 가이드로 이동합니다.`, "success");

      setTimeout(() => {
        window.location.href = redirectUrl;
      }, 700);
    }

    bizInput.addEventListener("input", function (e) {
      e.target.value = formatBizNo(e.target.value);
    });

    bizInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        moveToGuide();
      }
    });

    submitBtn.addEventListener("click", moveToGuide);

    autoRedirectIfAuthorized();
  </script>
</body>
</html>
